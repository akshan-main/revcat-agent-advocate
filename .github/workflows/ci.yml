name: CI — Test & Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Lint with ruff
        run: ruff check advocate/ cli.py tests/

      - name: Run tests
        env:
          DEMO_MODE: "true"
          DRY_RUN: "true"
        run: pytest tests/ -v --tb=short

  build-site:
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -e "."

      - name: Build site
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          TURSO_DATABASE_URL: ${{ secrets.TURSO_DATABASE_URL }}
          TURSO_AUTH_TOKEN: ${{ secrets.TURSO_AUTH_TOKEN }}
          CHROMA_HOST: ${{ secrets.CHROMA_HOST }}
          CHROMA_API_KEY: ${{ secrets.CHROMA_API_KEY }}
          CHROMA_TENANT: ${{ secrets.CHROMA_TENANT }}
          CHROMA_DATABASE: ${{ secrets.CHROMA_DATABASE }}
          DEMO_MODE: ${{ secrets.ANTHROPIC_API_KEY != '' && 'false' || 'true' }}
          DRY_RUN: "true"
          SITE_BASE_URL: "/revcat-agent-advocate"
        run: |
          revcat-advocate ingest-docs
          revcat-advocate generate-application
          revcat-advocate write-content --topic "RevenueCat Charts API" --type tutorial
          revcat-advocate write-content --topic "Building Agent-Native Monetization with RevenueCat MCP Server" --type agent_playbook
          revcat-advocate run-experiment --name programmatic-seo
          revcat-advocate generate-feedback --count 3
          revcat-advocate build-site
          revcat-advocate verify-ledger

      - name: Upload site artifact
        uses: actions/upload-artifact@v4
        with:
          name: site-output
          path: site_output/

  deploy:
    runs-on: ubuntu-latest
    needs: build-site
    if: github.ref == 'refs/heads/main'
    permissions:
      pages: write
      id-token: write

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Download site artifact
        uses: actions/download-artifact@v4
        with:
          name: site-output
          path: site_output/

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload to Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: site_output/

      - name: Deploy to Pages
        id: deployment
        uses: actions/deploy-pages@v4
