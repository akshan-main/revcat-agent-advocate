name: Agent Task

on:
  issues:
    types: [labeled]

permissions:
  contents: read
  issues: write

jobs:
  execute-task:
    if: contains(github.event.label.name, 'agent-task')
    runs-on: ubuntu-latest
    timeout-minutes: 25

    env:
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      TURSO_DATABASE_URL: ${{ secrets.TURSO_DATABASE_URL }}
      TURSO_AUTH_TOKEN: ${{ secrets.TURSO_AUTH_TOKEN }}
      HF_TOKEN: ${{ secrets.HF_TOKEN }}
      CONTEXTUAL_API_KEY: ${{ secrets.CONTEXTUAL_API_KEY }}
      DEVTO_API_KEY: ${{ secrets.DEVTO_API_KEY }}
      GITHUB_REPO: ${{ github.repository }}
      TWITTER_API_KEY: ${{ secrets.TWITTER_API_KEY }}
      TWITTER_API_SECRET: ${{ secrets.TWITTER_API_SECRET }}
      TWITTER_ACCESS_TOKEN: ${{ secrets.TWITTER_ACCESS_TOKEN }}
      TWITTER_ACCESS_SECRET: ${{ secrets.TWITTER_ACCESS_SECRET }}

    steps:
      - uses: actions/checkout@v5

      - name: Build supervisor image
        run: docker build -f Dockerfile.supervisor -t supervisor .

      - name: Ingest docs
        run: |
          docker run --rm \
            -e TURSO_DATABASE_URL -e TURSO_AUTH_TOKEN -e HF_TOKEN \
            -e RUNS_DIR=/tmp/runs -e DOCS_CACHE_DIR=/tmp/.docs_cache -e SITE_OUTPUT_DIR=/tmp/site_output \
            --entrypoint revcat-advocate \
            supervisor ingest-docs

      - name: Execute agent task
        timeout-minutes: 18
        env:
          AGENT_TASK_TITLE: ${{ github.event.issue.title }}
          AGENT_TASK_BODY: ${{ github.event.issue.body }}
          AGENT_TASK_NUMBER: ${{ github.event.issue.number }}
        run: |
          docker run --rm --read-only --tmpfs /tmp --tmpfs /home/agent/.cache \
            -e ANTHROPIC_API_KEY -e TURSO_DATABASE_URL -e TURSO_AUTH_TOKEN \
            -e HF_TOKEN -e CONTEXTUAL_API_KEY -e DEVTO_API_KEY -e GITHUB_REPO \
            -e TWITTER_API_KEY -e TWITTER_API_SECRET \
            -e TWITTER_ACCESS_TOKEN -e TWITTER_ACCESS_SECRET \
            -e AGENT_TASK_TITLE -e AGENT_TASK_BODY -e AGENT_TASK_NUMBER \
            -e RUNS_DIR=/tmp/runs -e DOCS_CACHE_DIR=/tmp/.docs_cache -e SITE_OUTPUT_DIR=/tmp/site_output \
            --entrypoint revcat-advocate \
            supervisor supervise \
            --max-actions 1 \
            --task-issue

      - name: Verify ledger
        run: |
          docker run --rm \
            -e TURSO_DATABASE_URL -e TURSO_AUTH_TOKEN \
            -e RUNS_DIR=/tmp/runs -e DOCS_CACHE_DIR=/tmp/.docs_cache -e SITE_OUTPUT_DIR=/tmp/site_output \
            --entrypoint revcat-advocate \
            supervisor verify-ledger

      - name: Close issue on success
        if: success()
        uses: actions/github-script@v7
        with:
          script: |
            const repo = context.repo;
            const siteUrl = `https://${repo.owner}.github.io/${repo.repo}/ledger/`;
            await github.rest.issues.createComment({
              ...repo,
              issue_number: context.issue.number,
              body: `Task completed by agent. Check the [ledger](${siteUrl}) for details.`
            });
            await github.rest.issues.update({
              ...repo,
              issue_number: context.issue.number,
              state: 'closed'
            });
            // Remove label to prevent reprocessing
            try {
              await github.rest.issues.removeLabel({
                ...repo,
                issue_number: context.issue.number,
                name: 'agent-task'
              });
            } catch (e) {
              // Label may already be removed — not critical
            }
