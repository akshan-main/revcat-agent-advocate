name: Agent Task

on:
  issues:
    types: [labeled]

permissions:
  contents: read
  issues: write

jobs:
  execute-task:
    if: contains(github.event.label.name, 'agent-task')
    runs-on: ubuntu-latest
    timeout-minutes: 25

    env:
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      TURSO_DATABASE_URL: ${{ secrets.TURSO_DATABASE_URL }}
      TURSO_AUTH_TOKEN: ${{ secrets.TURSO_AUTH_TOKEN }}
      HF_TOKEN: ${{ secrets.HF_TOKEN }}
      CONTEXTUAL_API_KEY: ${{ secrets.CONTEXTUAL_API_KEY }}
      DEVTO_API_KEY: ${{ secrets.DEVTO_API_KEY }}
      GITHUB_REPO: ${{ github.repository }}
      TWITTER_API_KEY: ${{ secrets.TWITTER_API_KEY }}
      TWITTER_API_SECRET: ${{ secrets.TWITTER_API_SECRET }}
      TWITTER_ACCESS_TOKEN: ${{ secrets.TWITTER_ACCESS_TOKEN }}
      TWITTER_ACCESS_SECRET: ${{ secrets.TWITTER_ACCESS_SECRET }}
      DRY_RUN: "false"
      RUNS_DIR: ./runs
      DOCS_CACHE_DIR: ./.docs_cache
      SITE_OUTPUT_DIR: ./site_output

    steps:
      - uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install project
        run: pip install .

      - name: Install Playwright MCP + Chromium
        run: |
          npm install -g @playwright/mcp@0.0.28
          npx playwright install --with-deps chromium

      - name: Ingest docs
        run: revcat-advocate ingest-docs --skip-rag

      - name: Execute agent task
        timeout-minutes: 18
        env:
          AGENT_TASK_TITLE: ${{ github.event.issue.title }}
          AGENT_TASK_BODY: ${{ github.event.issue.body }}
          AGENT_TASK_NUMBER: ${{ github.event.issue.number }}
        run: revcat-advocate supervise --max-actions 1 --task-issue

      - name: Verify ledger
        run: revcat-advocate verify-ledger

      - name: Close issue on success
        if: success()
        uses: actions/github-script@v8
        with:
          script: |
            const repo = context.repo;
            const siteUrl = `https://${repo.owner}.github.io/${repo.repo}/ledger/`;
            await github.rest.issues.createComment({
              ...repo,
              issue_number: context.issue.number,
              body: `Task completed by agent. Check the [ledger](${siteUrl}) for details.`
            });
            await github.rest.issues.update({
              ...repo,
              issue_number: context.issue.number,
              state: 'closed'
            });
            // Remove label to prevent reprocessing
            try {
              await github.rest.issues.removeLabel({
                ...repo,
                issue_number: context.issue.number,
                name: 'agent-task'
              });
            } catch (e) {
              // Label may already be removed — not critical
            }
