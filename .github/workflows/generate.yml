name: Generate — Full Agent Pipeline

on:
  workflow_dispatch:
    inputs:
      run_ingest:
        description: "Ingest docs (incremental)"
        type: boolean
        default: true
      run_content:
        description: "Generate content"
        type: boolean
        default: false
      content_topic:
        description: "Content topic (if generating)"
        type: string
        default: ""
      content_type:
        description: "Content type"
        type: choice
        options: [tutorial, case_study, agent_playbook]
        default: tutorial
      run_experiment:
        description: "Run experiment"
        type: boolean
        default: false
      experiment_name:
        description: "Experiment name"
        type: string
        default: "programmatic-seo"
      run_feedback:
        description: "Generate feedback"
        type: boolean
        default: false
      feedback_count:
        description: "Number of feedback items"
        type: string
        default: "3"
      run_letter:
        description: "Regenerate application letter"
        type: boolean
        default: false
      deploy:
        description: "Deploy to GitHub Pages after generation"
        type: boolean
        default: true

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -e "."

      - name: Cache docs
        uses: actions/cache@v4
        with:
          path: .docs_cache
          key: docs-cache-${{ hashFiles('advocate/knowledge/ingest.py') }}
          restore-keys: docs-cache-

      - name: Ingest docs
        if: ${{ inputs.run_ingest }}
        env:
          TURSO_DATABASE_URL: ${{ secrets.TURSO_DATABASE_URL }}
          TURSO_AUTH_TOKEN: ${{ secrets.TURSO_AUTH_TOKEN }}
        run: revcat-advocate ingest-docs

      - name: Generate application letter
        if: ${{ inputs.run_letter }}
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          TURSO_DATABASE_URL: ${{ secrets.TURSO_DATABASE_URL }}
          TURSO_AUTH_TOKEN: ${{ secrets.TURSO_AUTH_TOKEN }}
          SITE_BASE_URL: "/revcat-agent-advocate"
        run: revcat-advocate submit --max-regen 3

      - name: Generate content
        if: ${{ inputs.run_content && inputs.content_topic != '' }}
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          TURSO_DATABASE_URL: ${{ secrets.TURSO_DATABASE_URL }}
          TURSO_AUTH_TOKEN: ${{ secrets.TURSO_AUTH_TOKEN }}
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: revcat-advocate write-content --topic "${{ inputs.content_topic }}" --type ${{ inputs.content_type }}

      - name: Run experiment
        if: ${{ inputs.run_experiment }}
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          TURSO_DATABASE_URL: ${{ secrets.TURSO_DATABASE_URL }}
          TURSO_AUTH_TOKEN: ${{ secrets.TURSO_AUTH_TOKEN }}
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: revcat-advocate run-experiment --name "${{ inputs.experiment_name }}"

      - name: Generate feedback
        if: ${{ inputs.run_feedback }}
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          TURSO_DATABASE_URL: ${{ secrets.TURSO_DATABASE_URL }}
          TURSO_AUTH_TOKEN: ${{ secrets.TURSO_AUTH_TOKEN }}
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: revcat-advocate generate-feedback --count ${{ inputs.feedback_count }}

      - name: Build site
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          TURSO_DATABASE_URL: ${{ secrets.TURSO_DATABASE_URL }}
          TURSO_AUTH_TOKEN: ${{ secrets.TURSO_AUTH_TOKEN }}
          CHROMA_HOST: ${{ secrets.CHROMA_HOST }}
          CHROMA_API_KEY: ${{ secrets.CHROMA_API_KEY }}
          CHROMA_TENANT: ${{ secrets.CHROMA_TENANT }}
          CHROMA_DATABASE: ${{ secrets.CHROMA_DATABASE }}
          DEMO_MODE: "false"
          DRY_RUN: "true"
          SITE_BASE_URL: "/revcat-agent-advocate"
          SEARCH_API_URL: ${{ secrets.SEARCH_API_URL }}
        run: revcat-advocate build-site --clean

      - name: Setup Pages
        if: ${{ inputs.deploy }}
        uses: actions/configure-pages@v4

      - name: Upload to Pages
        if: ${{ inputs.deploy }}
        uses: actions/upload-pages-artifact@v3
        with:
          path: site_output/

      - name: Deploy to Pages
        if: ${{ inputs.deploy }}
        id: deployment
        uses: actions/deploy-pages@v4
