name: Supervisor

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:
    inputs:
      max_actions:
        description: 'Max actions per cycle'
        default: '3'
      dry_run:
        description: 'Dry run (no external posts)'
        type: boolean
        default: false

concurrency:
  group: supervisor
  cancel-in-progress: false

jobs:
  supervisor-cycle:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    env:
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      TURSO_DATABASE_URL: ${{ secrets.TURSO_DATABASE_URL }}
      TURSO_AUTH_TOKEN: ${{ secrets.TURSO_AUTH_TOKEN }}
      HF_TOKEN: ${{ secrets.HF_TOKEN }}
      CONTEXTUAL_API_KEY: ${{ secrets.CONTEXTUAL_API_KEY }}
      DEVTO_API_KEY: ${{ secrets.DEVTO_API_KEY }}
      GITHUB_TOKEN: ${{ secrets.TOKEN || secrets.GITHUB_TOKEN }}
      GITHUB_REPO: ${{ github.repository }}
      TWITTER_API_KEY: ${{ secrets.TWITTER_API_KEY }}
      TWITTER_API_SECRET: ${{ secrets.TWITTER_API_SECRET }}
      TWITTER_ACCESS_TOKEN: ${{ secrets.TWITTER_ACCESS_TOKEN }}
      TWITTER_ACCESS_SECRET: ${{ secrets.TWITTER_ACCESS_SECRET }}
      DRY_RUN: ${{ inputs.dry_run && 'true' || 'false' }}

    steps:
      - uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install project
        run: pip install .

      - name: Install Playwright MCP + Chromium
        run: |
          npm install -g @playwright/mcp@0.0.28
          npx playwright install --with-deps chromium

      - name: Ingest docs
        run: revcat-advocate ingest-docs --skip-rag

      - name: Supervisor cycle
        timeout-minutes: 18
        run: >-
          revcat-advocate supervise
          --max-actions ${{ github.event_name == 'schedule' && '1' || github.event.inputs.max_actions || '3' }}

      - name: Verify ledger
        run: revcat-advocate verify-ledger
