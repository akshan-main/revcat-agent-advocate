name: Weekly — Autonomous Advocate Cycle

on:
  schedule:
    - cron: '0 9 * * 1'  # Every Monday 9:00 UTC
  workflow_dispatch:       # Also runnable manually

jobs:
  agent-cycle:
    runs-on: ubuntu-latest

    env:
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      TURSO_DATABASE_URL: ${{ secrets.TURSO_DATABASE_URL }}
      TURSO_AUTH_TOKEN: ${{ secrets.TURSO_AUTH_TOKEN }}
      HF_TOKEN: ${{ secrets.HF_TOKEN }}
      DEVTO_API_KEY: ${{ secrets.DEVTO_API_KEY }}
      DRY_RUN: "false"

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -e "."

      - name: Ingest docs
        run: revcat-advocate ingest-docs

      - name: Run autonomous advocate cycle
        run: revcat-advocate auto --agentic --once

      - name: Build site
        run: revcat-advocate build-site

      - name: Publish gate
        run: revcat-advocate publish-gate

      - name: Verify ledger
        run: revcat-advocate verify-ledger
