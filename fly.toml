app = "rcagent-search"
primary_region = "sjc"

[build]

[env]
  PORT = "8080"
  DOCS_CACHE_DIR = "./.docs_cache"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0

[[vm]]
  memory = "512mb"
  cpu_kind = "shared"
  cpus = 1
