# ── Action Firewall ──────────────────────────────────────────────────
# Pre-execution rules evaluated before every agent action.
# allow_if: ALL must be true. deny_if: ANY true blocks.

rules:
  - action: post_tweet
    allow_if: ["dry_run == false", "critic_verdict == approved"]
  - action: call_revenuecat_api
    deny_if: ["method in [POST,PUT,DELETE] and allow_writes == false"]
  - action: read_file
    deny_if: ["path matches .env* or secrets*"]
  - action: deploy
    allow_if: ["explicit_user_command == true"]
  - action: git_push
    allow_if: ["explicit_user_command == true"]
  - action: delete_content
    allow_if: ["explicit_user_command == true"]
  - action: write_content
    deny_if: ["word_count < 300"]

  # ── Supervisor Rate Limits ────────────────────────────────────────
  # Prevent runaway autonomous actions per day.
  - action: supervisor_write_content
    deny_if: ["write_content_today > 2"]
  - action: supervisor_draft_community_response
    deny_if: ["draft_community_response_today > 5"]
  - action: supervisor_draft_tweet
    deny_if: ["draft_tweet_today > 3"]
  - action: supervisor_generate_feedback
    deny_if: ["generate_feedback_today > 2"]
  - action: supervisor_rebuild_site
    deny_if: ["rebuild_site_today > 3"]

# ── Eval Gates ───────────────────────────────────────────────────────
# Quality thresholds checked after production. Failures trigger rollback.

eval_gates:
  content:
    min_citations: 3
    min_word_count: 500
    max_unverified_claims: 0
    required_sections: ["Sources"]
  tweet:
    max_chars: 280
    critic_must_approve: true
    max_rewrite_attempts: 3
  feedback:
    must_have_repro_steps: true
    must_have_proposed_fix: true

# ── Rollback Policy ──────────────────────────────────────────────────
# What happens when an eval gate fails post-execution.

rollback:
  content_below_threshold:
    action: quarantine        # move to quarantine status, hide from site
    notify: ledger            # log to tamper-evident audit trail
    auto_retry: false
  tweet_rejected_final:
    action: discard           # don't post, log the draft
    notify: ledger
    auto_retry: false
  deploy_failed:
    action: revert_site       # rebuild from last known-good DB state
    notify: ledger
    auto_retry: true
    max_retries: 1
